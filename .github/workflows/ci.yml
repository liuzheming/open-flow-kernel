name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Run clean build
        run: ./gradlew clean build --no-daemon --warning-mode all

      - name: Compile MySQL integration tests
        run: ./gradlew :flow-kernel-persistence-jdbc:mysqlIntegrationTestClasses --no-daemon --warning-mode all
